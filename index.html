<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Commute Forest Builder</title>
    <!-- Link to our external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <!-- HEADER SECTION -->
        <header>
            <h1>Green Commute Forest Builder</h1>
            <p>Every sustainable choice reduces carbon emissions. Log your daily commute to help build a thriving, green community forest for SDG 11!</p>
        </header>

        <!-- INPUT SECTION (The Commute Logger) -->
        <section class="logger-section">
            <h2>Log Your Commute</h2>
            <form id="commuteForm">
                <div class="form-group">
                    <label for="transportType">Mode of Transport:</label>
                    <select id="transportType" required>
                        <option value="" disabled selected>-- Select Transport --</option>
                        <option value="walk">Walk 🚶</option>
                        <option value="bike">Bike 🚲</option>
                        <option value="bus">Bus 🚌</option>
                        <option value="car">Car 🚗</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="distance">Distance Traveled (in km):</label>
                    <input type="number" id="distance" min="0.1" step="0.1" placeholder="e.g. 3.5" required>
                </div>

                <button type="submit" id="submitBtn">Log My Commute</button>
            </form>
        </section>

        <!-- DISPLAY SECTION (The Community Forest) -->
        <section class="forest-section">
            <h2>The Community Forest</h2>
            
            <div class="counter-box">
                <span id="pointsDisplay">Total Carbon Saved: 0 CP</span>
            </div>

            <!-- This is where our JavaScript will add the 🌳 icons dynamically -->
            <div id="forestContainer" class="forest-container">
                <!-- Trees will be planted here -->
            </div>
        </section>
    </div>

    <!-- Link to our external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
